<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>社区物业管理系统</title>
  <!-- Tailwind CSS: CDN + 本地后备 -->
  <script src="https://cdn.tailwindcss.com"
          onerror="var s=document.createElement('script');s.src='/static/js/tailwind-browser.js';document.head.appendChild(s)"></script>
  <link href="/static/css/style.css" rel="stylesheet">
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- 登录页 -->
  <div id="login-overlay" class="login-overlay">
    <div class="login-box">
      <div class="text-center mb-6">
        <div class="login-icon">🏢</div>
        <h1 class="text-xl font-bold text-gray-800 mt-3">社区物业管理系统</h1>
        <p class="text-sm text-gray-400 mt-1">数据库课程设计作品</p>
      </div>
      <div class="form-group">
        <label>用户名</label>
        <input id="login-username" placeholder="请输入用户名" autocomplete="username">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input id="login-password" type="password" placeholder="请输入密码" autocomplete="current-password">
      </div>
      <div id="login-error" class="text-red-500 text-sm mb-3 hidden"></div>
      <button id="login-btn" class="btn btn-primary login-btn" onclick="doLogin()">
        🔑 登 录
      </button>
      <div class="login-hint">
        <p>管理员：admin / admin123</p>
        <p>普通用户：user / user123</p>
      </div>
    </div>
  </div>

  <!-- 侧边栏（初始隐藏） -->
  <aside id="sidebar" class="fixed left-0 top-0 h-full w-56 bg-slate-800 text-white z-50 flex flex-col hidden">
    <div class="p-5 border-b border-slate-700">
      <h1 class="text-lg font-bold flex items-center gap-2">
        🏢 社区物业管理
      </h1>
      <p class="text-xs text-slate-400 mt-1">数据库课程设计作品</p>
    </div>
    <nav class="flex-1 py-3 overflow-y-auto">
      <a href="#" class="nav-item active" data-page="dashboard">
        <span class="nav-emoji">📊</span> 控制台
      </a>
      <a href="#" class="nav-item" data-page="buildings">
        <span class="nav-emoji">🏗️</span> 楼栋管理
      </a>
      <a href="#" class="nav-item" data-page="rooms">
        <span class="nav-emoji">🏠</span> 房屋管理
      </a>
      <a href="#" class="nav-item" data-page="residents">
        <span class="nav-emoji">👤</span> 住户管理
      </a>
      <a href="#" class="nav-item" data-page="parking">
        <span class="nav-emoji">🅿️</span> 车位管理
      </a>
      <a href="#" class="nav-item" data-page="vehicles">
        <span class="nav-emoji">🚗</span> 车辆登记
      </a>
      <a href="#" class="nav-item" data-page="fees">
        <span class="nav-emoji">💰</span> 物业费管理
      </a>
      <a href="#" class="nav-item" data-page="repairs">
        <span class="nav-emoji">🔧</span> 报修工单
      </a>
      <a href="#" class="nav-item" data-page="complaints">
        <span class="nav-emoji">💬</span> 投诉建议
      </a>
      <a href="#" class="nav-item" data-page="announcements">
        <span class="nav-emoji">📢</span> 公告通知
      </a>
      <a href="#" class="nav-item" data-page="visitors">
        <span class="nav-emoji">🚶</span> 访客登记
      </a>
      <a href="#" class="nav-item" data-page="staff">
        <span class="nav-emoji">👥</span> 工作人员
      </a>
    </nav>
    <!-- 用户信息区 -->
    <div class="p-4 border-t border-slate-700">
      <div class="flex items-center gap-2 mb-2">
        <div class="user-avatar" id="user-avatar">A</div>
        <div class="flex-1 min-w-0">
          <div class="text-sm font-medium text-white truncate" id="user-nickname">管理员</div>
          <div class="text-xs text-slate-400" id="user-role-label">admin</div>
        </div>
      </div>
      <button onclick="doLogout()" class="btn btn-sm logout-btn">
        🚪 退出登录
      </button>
    </div>
  </aside>

  <!-- 主内容区（初始隐藏） -->
  <main id="main-area" class="ml-56 min-h-screen hidden">
    <!-- 顶部栏 -->
    <header class="bg-white shadow-sm px-6 py-3 flex items-center justify-between sticky top-0 z-40">
      <h2 id="page-title" class="text-lg font-semibold text-gray-800">控制台</h2>
      <div class="text-sm text-gray-500" id="current-time"></div>
    </header>

    <!-- 内容容器 -->
    <div id="content" class="p-6"></div>
  </main>

  <!-- 通用模态框 -->
  <div id="modal" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg mx-4 max-h-[80vh] overflow-y-auto">
      <div class="flex items-center justify-between p-4 border-b">
        <h3 id="modal-title" class="text-lg font-semibold"></h3>
        <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-xl font-bold">✕</button>
      </div>
      <div id="modal-body" class="p-4"></div>
      <div class="p-4 border-t flex justify-end gap-2">
        <button onclick="closeModal()" class="px-4 py-2 text-sm rounded-lg bg-gray-100 hover:bg-gray-200">取消</button>
        <button id="modal-submit" class="px-4 py-2 text-sm rounded-lg bg-blue-600 text-white hover:bg-blue-700">确定</button>
      </div>
    </div>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
